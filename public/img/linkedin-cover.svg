<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eef2f5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c4a7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00e5c4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tealFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c4a7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00c4a7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00e5c4;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c4a7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a0b4c0;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bg)"/>

  <!-- Subtle diagonal lines pattern -->
  <g opacity="0.04" stroke="#1a2a3a" stroke-width="1">
    <line x1="0" y1="50" x2="200" y2="0"/><line x1="0" y1="100" x2="250" y2="0"/>
    <line x1="0" y1="150" x2="300" y2="0"/><line x1="0" y1="191" x2="350" y2="0"/>
    <line x1="50" y1="191" x2="400" y2="0"/><line x1="100" y1="191" x2="450" y2="0"/>
    <line x1="150" y1="191" x2="500" y2="0"/><line x1="200" y1="191" x2="550" y2="0"/>
    <line x1="800" y1="191" x2="1128" y2="50"/><line x1="850" y1="191" x2="1128" y2="80"/>
    <line x1="900" y1="191" x2="1128" y2="110"/><line x1="950" y1="191" x2="1128" y2="140"/>
    <line x1="1000" y1="191" x2="1128" y2="170"/>
  </g>

  <!-- Left teal accent bar -->
  <rect x="60" y="88" width="120" height="8" rx="4" fill="url(#teal)" filter="url(#glow)"/>
  <rect x="60" y="88" width="80" height="8" rx="4" fill="url(#tealFade)" opacity="0.6"/>

  <!-- AI Logo mark (mini) -->
  <rect x="60" y="44" width="90" height="60" rx="10" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.6"/>
  <text x="105" y="86" font-family="'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#d0dde6" text-anchor="middle" opacity="0.9">AI</text>
  <circle cx="142" cy="52" r="5" fill="#00c4a7" filter="url(#glow)"/>

  <!-- Company name -->
  <text x="180" y="84" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="36" font-weight="700" fill="#1a2a3a" letter-spacing="1">Adone Intelligence</text>

  <!-- Tagline -->
  <text x="181" y="112" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="15" font-weight="400" fill="#4a6070" letter-spacing="2">DADOS QUE PENSAM. RESULTADOS QUE ESCALAM.</text>

  <!-- Teal underline under tagline -->
  <rect x="181" y="120" width="340" height="2" rx="1" fill="url(#teal)" opacity="0.5"/>

  <!-- Right side - decorative elements -->
  <circle cx="980" cy="60" r="40" fill="none" stroke="#00c4a7" stroke-width="1" opacity="0.15"/>
  <circle cx="980" cy="60" r="25" fill="none" stroke="#00c4a7" stroke-width="1" opacity="0.2"/>
  <circle cx="980" cy="60" r="8" fill="#00c4a7" opacity="0.2"/>

  <circle cx="1060" cy="130" r="25" fill="none" stroke="#00c4a7" stroke-width="1" opacity="0.12"/>
  <circle cx="1060" cy="130" r="12" fill="#00c4a7" opacity="0.1"/>

  <!-- Pills/tags -->
  <rect x="700" y="70" width="120" height="26" rx="13" fill="none" stroke="#00c4a7" stroke-width="1" opacity="0.4"/>
  <text x="760" y="87" font-family="'Arial', sans-serif" font-size="11" fill="#00c4a7" text-anchor="middle" font-weight="600">Machine Learning</text>

  <rect x="832" y="70" width="90" height="26" rx="13" fill="none" stroke="#00c4a7" stroke-width="1" opacity="0.4"/>
  <text x="877" y="87" font-family="'Arial', sans-serif" font-size="11" fill="#00c4a7" text-anchor="middle" font-weight="600">Automação IA</text>

  <rect x="700" y="106" width="80" height="26" rx="13" fill="none" stroke="#00c4a7" stroke-width="1" opacity="0.4"/>
  <text x="740" y="123" font-family="'Arial', sans-serif" font-size="11" fill="#00c4a7" text-anchor="middle" font-weight="600">NLP &amp; Chatbots</text>

  <rect x="790" y="106" width="130" height="26" rx="13" fill="none" stroke="#00c4a7" stroke-width="1" opacity="0.4"/>
  <text x="855" y="123" font-family="'Arial', sans-serif" font-size="11" fill="#00c4a7" text-anchor="middle" font-weight="600">Visão Computacional</text>

  <!-- Website -->
  <text x="181" y="158" font-family="'Arial', sans-serif" font-size="13" fill="#00c4a7" font-weight="600" opacity="0.8">adoneintelligence.com.br</text>

  <!-- Bottom teal line -->
  <rect x="0" y="187" width="1128" height="4" fill="url(#teal)" opacity="0.6"/>
</svg>
