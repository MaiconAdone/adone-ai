<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c4a7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5c4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="roundedClip">
      <rect width="500" height="500" rx="60" ry="60"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="500" height="500" rx="60" ry="60" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern overlay -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="500" y2="100" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="300" x2="500" y2="300" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="400" x2="500" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="500" stroke="#ffffff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#ffffff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Letter A -->
  <text
    x="70"
    y="330"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="260"
    font-weight="900"
    fill="url(#textGrad)"
    filter="url(#softShadow)"
    letter-spacing="-10"
  >A</text>

  <!-- Letter I -->
  <text
    x="268"
    y="330"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="260"
    font-weight="900"
    fill="url(#textGrad)"
    filter="url(#softShadow)"
    letter-spacing="-10"
  >I</text>

  <!-- Teal horizontal accent bar (crossing the A) -->
  <rect x="48" y="228" width="130" height="14" rx="7" fill="url(#tealGrad)" filter="url(#glow)"/>

  <!-- Teal dot top right -->
  <circle cx="430" cy="82" r="18" fill="url(#tealGrad)" filter="url(#glow)"/>

  <!-- Small teal accent bottom left -->
  <rect x="48" y="355" width="55" height="8" rx="4" fill="#00c4a7" opacity="0.5"/>

  <!-- Company name -->
  <text
    x="250"
    y="415"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="32"
    font-weight="600"
    fill="#f5f0e8"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.92"
  >ADONE INTELLIGENCE</text>

  <!-- Thin teal underline below company name -->
  <rect x="140" y="425" width="220" height="2" rx="1" fill="url(#tealGrad)" opacity="0.7"/>
</svg>
